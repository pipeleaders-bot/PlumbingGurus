<style>
:root{
--dark:#03080f;
--blue:#1D6FA3;
--glow:#35a0d9;
--accent:#4fd3ff;
--gold:#ffc107;
--muted:#a9bdd3;
--glass:rgba(255,255,255,.06);
}

body{
margin:0;
font-family:Inter;
background:radial-gradient(circle at 30% 20%, #0d2a44, #03080f 70%);
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:30px 20px 120px;
text-align:center;
}

/* 🔥 LOGO HERO */
.logo-wrap{
background:radial-gradient(circle, rgba(53,160,217,.25), transparent 70%);
padding:20px 10px 5px;
border-radius:20px;
margin-bottom:5px;
}

.logo{
width:320px;
max-width:90%;
filter:drop-shadow(0 0 25px rgba(79,211,255,.7));
margin-bottom:5px;
}

/* TEXT */
h1{
font-family:Poppins;
font-size:42px;
margin-top:10px;
}

h2{
font-family:Poppins;
margin-top:70px;
}

p{
color:var(--muted);
font-size:18px;
}

/* BUTTONS */
.btn{
display:inline-block;
margin:10px;
padding:16px 34px;
border-radius:40px;
background:linear-gradient(90deg,#ffc107,#ffda44);
color:black;
text-decoration:none;
font-weight:700;
box-shadow:0 10px 30px rgba(255,193,7,.4);
}

.btn.secondary{
background:linear-gradient(90deg,var(--blue),var(--glow));
color:white;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
margin-top:40px;
}

/* CARD */
.card{
background:var(--glass);
padding:25px;
border-radius:18px;
backdrop-filter:blur(16px);
box-shadow:0 15px 40px rgba(0,0,0,.6);
}

.review{
background:var(--glass);
padding:20px;
border-radius:15px;
}

/* FORM */
input, textarea, select{
width:90%;
padding:12px;
margin:8px;
border-radius:8px;
border:none;
}

/* CTA STRIP */
.cta-strip{
margin-top:70px;
padding:30px;
border-radius:18px;
background:linear-gradient(90deg,#1D6FA3,#35a0d9);
}

/* CALL BAR */
.callbar{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

.callbar a{
flex:1;
padding:18px;
text-align:center;
font-weight:700;
text-decoration:none;
}

.callbar a:first-child{background:#ffc107;color:black;}
.callbar a:last-child{background:#1D6FA3;color:white;}

/* MOBILE */
@media(max-width:600px){
.logo{width:240px;}
h1{font-size:30px;}
}

</style>

</head>
