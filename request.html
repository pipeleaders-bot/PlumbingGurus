<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Service Request | Plumbing Gurus</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#050b14;
color:white;
}

.container{
max-width:500px;
margin:auto;
padding:80px 15px;
text-align:center;
}

h1{
font-family:Poppins;
margin-bottom:10px;
}

.price{
color:#4fd3ff;
margin-bottom:10px;
}

.small{
font-size:13px;
color:#a9bdd3;
margin-bottom:20px;
}

form{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:16px;
display:flex;
flex-direction:column;
gap:12px;
}

input, select, textarea{
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
}

input[type="file"]{
background:white;
}

button{
padding:16px;
border-radius:40px;
border:none;
background:linear-gradient(90deg,#1D6FA3,#35a0d9);
color:white;
font-size:16px;
font-weight:600;
}

button:active{
transform:scale(.98);
}

</style>
</head>

<body>

<div class="container">

<h1>Get a Fast Quote</h1>

<p class="price">Most installs: $180–$450</p>

<p class="small">
Send a photo + phone number. That’s it.
</p>

<form action="https://formsubmit.co/YOUR-EMAIL" method="POST" enctype="multipart/form-data">

<input type="hidden" name="_subject" value="New Quick Request">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://www.plumbinggurus.us/thank-you.html">

<!-- PHOTO FIRST (KEY) -->
<input type="file" name="Photos" accept="image/*" required>

<!-- ONLY REQUIRED FIELD -->
<input type="tel" name="Phone" placeholder="Phone number" required>

<!-- OPTIONAL FIELDS -->
<select name="Service">
<option value="">Service (optional)</option>
<option>Toilet Replacement</option>
<option>Faucet Replacement</option>
<option>Shower Trim</option>
<option>Other</option>
</select>

<textarea name="Details" rows="3" placeholder="Optional details"></textarea>

<button type="submit">Send Photo & Get Price</button>

</form>

</div>

</body>
</html>
